# Iyi mirongo uko ari itatu ni iyo wari usanganywe. Twayisize uko iri.
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
android.enableJetifier=true

# --- IMIRONGO MISHYA YONGEYEWEHO GUSA ---
# Iyi mirongo yongerera Gradle iminota itatu (3) yo gutegereza (timeout)
# igihe irimo gukurura amadosiye kuri interineti.
systemProp.org.gradle.internal.http.connectionTimeout=180000
systemProp.org.gradle.internal.http.socketTimeout=180000