name: jembe_talk
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # =========================================================
  # =====> FIREBASE PACKAGES (APP CHECK UPDATED) <=====
  # =========================================================
  firebase_core: ^3.2.0
  firebase_auth: ^5.2.0
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.2.0
  firebase_messaging: ^15.0.0
  firebase_database: ^11.1.0
  firebase_app_check: ^0.3.1
  cloud_functions: ^5.1.0
  firebase_dynamic_links: ^6.1.10

  flutter_local_notifications: ^17.2.2
  flutter_app_badger: ^1.5.0
  flutter_native_splash: ^2.4.4

  animations: ^2.0.11
  async: ^2.13.0
  cached_network_image: ^3.3.1

  # =========================================================
  # =====> VIDEO PACKAGES <=====
  # =========================================================
  video_player: ^2.8.6
  cached_video_player_plus: ^3.0.1
  chewie: ^1.7.5
  video_thumbnail: ^0.5.3
  video_editor: ^3.0.0

  connectivity_plus: ^6.0.3
  country_code_picker: ^3.0.0
  cupertino_icons: ^1.0.6
  device_info_plus: ^11.0.0
  dio: ^5.4.3+1
  ffmpeg_kit_flutter_new: ^3.2.0
  file_picker: ^10.0.0

  flutter_cache_manager: ^3.3.1
  flutter_contacts: ^1.1.9+2
  flutter_linkify: ^6.0.0
  flutter_staggered_animations: ^1.1.1
  flutter_slidable: ^3.1.0
  font_awesome_flutter: ^10.7.0
  
  # =========================================================
  # =====> CLOUDFLARE R2 & NETWORK <=====
  # =========================================================
  # minio_new yakuwemo kubera umutekano (Security Update)
  http: ^1.2.1   
  mime: ^1.0.5  
  intl: ^0.20.0  

  image: ^4.2.0
  image_editor_plus: any
  image_picker: ^1.1.2
  just_audio: ^0.9.37
  liquid_pull_to_refresh: ^3.0.1
  liquid_swipe: ^3.1.0
  media_store_plus: ^0.1.3
  open_filex: ^4.7.0
  package_info_plus: ^8.0.0
  page_flip_builder: 0.1.4
  page_transition: ^2.1.0
  path: ^1.9.0
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  pinput: ^5.0.0
  provider: ^6.1.2
  rxdart: ^0.27.7
  scroll_to_index: ^3.0.0
  share_plus: ^11.0.0
  shared_preferences: ^2.2.3
  social_media_recorder: ^1.2.1
  sqflite: ^2.3.3+1
  url_launcher: ^6.2.1
  youtube_player_flutter: ^9.0.0
  uuid: ^4.4.0
  visibility_detector: ^0.4.0+2
  
  wakelock_plus: ^1.3.3
  timeago: ^3.7.0
  phone_numbers_parser: ^9.0.19

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

dependency_overrides:
  http: ^1.2.1
  intl: ^0.20.0 
  record: ^5.0.5
  record_linux: ^1.0.0
  permission_handler: ^12.0.1
  just_audio: 0.10.4
  flutter_inappwebview: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/fonts/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Italic.ttf
          style: italic
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-BoldItalic.ttf
          weight: 700
          style: italic
    - family: Lato
      fonts:
        - asset: assets/fonts/Lato-Regular.ttf
        - asset: assets/fonts/Lato-Italic.ttf
          style: italic
        - asset: assets/fonts/Lato-Bold.ttf
          weight: 700
        - asset: assets/fonts/Lato-BoldItalic.ttf
          weight: 700
          style: italic

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/jeme_talk_icon.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#263238"
  image: assets/images/jeme_talk_icon.png
  android_12:
    image: assets/images/jeme_talk_icon.png
    color: "#263238"
  android: true
  ios: true