<!DOCTYPE html>
<html>
<head>
  <!-- Ibi bikungura uburyo Flutter iyobora umukoresha (Routing) -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  
  <!-- Iyi description niyo iza munsi y'izina muri WhatsApp -->
  <meta name="description" content="Sangira ibihe byiza, amafoto n'amavideo kuri Jembe Talk.">

  <!-- Meta tags for Social Media (WhatsApp) - Ibi nibyo bituma link isomeka neza -->
  <meta property="og:title" content="JEMBE TALK ⭐">
  <meta property="og:description" content="Fyonda hano urabe iyi post kuri Tangaza Star⭐.">
  <meta property="og:image" content="icons/Icon-192.png"> <!-- Wemeze ko iyi icon ihari -->
  <meta property="og:url" content="https://jembe-talk-1.web.app">
  <meta property="og:type" content="website">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Jembe Talk">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Izina rya Page rerekana mu mutwe wa Browser na WhatsApp -->
  <title>Jembe Talk</title>
  
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Iyi script ni ingenzi cyane kuko niyo itangiza Flutter, ntuyikureho -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
